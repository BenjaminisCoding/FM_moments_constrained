label: single_cell_schiebinger_pilot_20d
family: single_cell
coupling: ot_global

dim: 20
constraint_times: []
constraint_time_policy: observed_nonendpoint_all

single_cell:
  constraint_times_normalized: [0.5]
  eval_times_normalized: [0.5]
  path: ${hydra:runtime.cwd}/datasets/schiebinger_serum_d10_d10p5_d11_hvg_pca50.h5ad
  max_dim: 20
  whiten: true
  embed_key_npz: pcs
  label_key_npz: sample_labels
  embed_key_h5ad: X_pca
  label_key_h5ad: day
  global_ot_cache_enabled: true
  global_ot_cache_dir: .cache/ot_plans
  global_ot_force_recompute: false
  global_ot_support_tol: 1.0e-12
  global_ot_max_variables: null
  pseudo_labels:
    enabled: false
    method: supervised_mlp
    posterior_temperature: 1.0
    fit_times_normalized: [0.5]
    supervised_label_key: cell_sets
    supervised_hidden_dims: [128, 128]
    supervised_activation: silu
    supervised_epochs: 300
    supervised_batch_size: 256
    supervised_lr: 1.0e-3
    supervised_weight_decay: 1.0e-4
    supervised_seed: 7
    supervised_min_class_count: 1
    supervised_val_fraction: 0.0
    supervised_split_seed: 7
    supervised_early_stopping_patience: 20
    supervised_early_stopping_min_epochs: 20
    supervised_early_stopping_min_delta: 0.0
    supervised_logreg_c: 1.0
    supervised_logreg_penalty: l2
    supervised_logreg_max_iter: 1000
    supervised_logreg_class_weight: balanced
    supervised_logreg_seed: 7
    k_min: 2
    k_max: 10
    seeds: [7, 11, 19]
    n_init: 3
    max_iter: 300
    tol: 1.0e-3
    reg_covar: 1.0e-6
    stability_threshold: 0.7
    cache_enabled: true
    cache_dir: .cache/pseudo_labels
    force_recompute: false
